# Runs on every PR against main. This is the "automated testing & test
# builds ... as part of the PR process" half of the shift-left story - a
# human reviewer never sees a PR that hasn't already passed lint, unit
# tests, a Helm render, and a live smoke-deploy to an ephemeral kind
# cluster. Path filters mean only the services actually touched get
# rebuilt/retested, so a docs-only PR is fast.
name: PR Validate

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      edge-api: ${{ steps.filter.outputs.edge-api }}
      order-service: ${{ steps.filter.outputs.order-service }}
      inventory-service: ${{ steps.filter.outputs.inventory-service }}
      queue-bridge: ${{ steps.filter.outputs.queue-bridge }}
      notify-function: ${{ steps.filter.outputs.notify-function }}
      gitops: ${{ steps.filter.outputs.gitops }}
      chart: ${{ steps.filter.outputs.chart }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            edge-api: ['apps/edge-api-node/**']
            order-service: ['apps/order-service-go/**']
            inventory-service: ['apps/inventory-service-python/**']
            queue-bridge: ['apps/queue-bridge-python/**']
            notify-function: ['apps/notify-function-dotnet/**']
            gitops: ['gitops/**']
            chart: ['charts/**']

  edge-api:
    needs: changes
    if: needs.changes.outputs.edge-api == 'true'
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: apps/edge-api-node}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20', cache: 'npm', cache-dependency-path: apps/edge-api-node/package.json}
      - run: npm install --no-audit --no-fund
      - run: npm test
      - name: Build image (no push - proves the Dockerfile works)
        run: docker build -t edge-api:pr-${{ github.event.pull_request.number }} .

  order-service:
    needs: changes
    if: needs.changes.outputs.order-service == 'true'
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: apps/order-service-go}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.22'}
      - run: go vet ./...
      - run: go test ./... -v
      - name: Build image
        run: docker build -t order-service:pr-${{ github.event.pull_request.number }} .

  inventory-service:
    needs: changes
    if: needs.changes.outputs.inventory-service == 'true'
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: apps/inventory-service-python}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements-dev.txt
      - run: PYTHONPATH=. pytest -q
      - name: Build image
        run: docker build -t inventory-service:pr-${{ github.event.pull_request.number }} .

  queue-bridge:
    needs: changes
    if: needs.changes.outputs.queue-bridge == 'true'
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: apps/queue-bridge-python}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements-dev.txt
      - run: PYTHONPATH=. pytest -q
      - name: Build image
        run: docker build -t queue-bridge:pr-${{ github.event.pull_request.number }} .

  notify-function:
    needs: changes
    if: needs.changes.outputs.notify-function == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: {dotnet-version: '8.0.x'}
      - run: dotnet test apps/notify-function-dotnet/tests
      - name: Build image
        run: docker build -t notify-function:pr-${{ github.event.pull_request.number }} apps/notify-function-dotnet

  chart-and-gitops-lint:
    needs: changes
    if: needs.changes.outputs.chart == 'true' || needs.changes.outputs.gitops == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: {version: 'v3.15.4'}
      - name: helm lint
        run: helm lint charts/service-template
      - name: helm template every service/env combo (catches bad values files)
        run: |
          set -euo pipefail
          for f in gitops/services/catalog/*/values-*.yaml; do
            echo "-- rendering $f"
            helm template demo charts/service-template -f "$f" > /dev/null
          done
      - name: yamllint
        run: |
          pip install --quiet yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" gitops charts clusters

  ephemeral-smoke-test:
    needs: [changes, chart-and-gitops-lint]
    if: always() && (needs.changes.outputs.chart == 'true' || needs.changes.outputs.gitops == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create ephemeral kind cluster
        uses: helm/kind-action@v1
        with: {cluster_name: pr-smoke}
      - uses: azure/setup-helm@v4
        with: {version: 'v3.15.4'}
      - name: Deploy every changed service's rendered manifests (server-side dry run)
        run: |
          set -euo pipefail
          for f in gitops/services/catalog/*/values-dev.yaml; do
            svc=$(basename "$(dirname "$f")")
            ns="pr-smoke-${svc}"
            kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
            helm template "$svc" charts/service-template -f "$f" --namespace "$ns" \
              --set image.repository=busybox --set image.tag=1.36 \
              | kubectl apply --dry-run=server -f -
          done
      - name: Result
        run: echo "Server-side validation passed - the API server accepted every rendered manifest."
