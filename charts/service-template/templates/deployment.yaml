apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "service-template.fullname" . }}
  labels: {{- include "service-template.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "service-template.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "service-template.labels" . | nindent 8 }}
        {{- toYaml .Values.podLabels | nindent 8 }}
      annotations:
        {{- if .Values.mesh.inject }}
        linkerd.io/inject: enabled
        config.linkerd.io/trace-collector: {{ .Values.observability.otel.exporterEndpoint | quote }}
        {{- end }}
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ .Values.observability.serviceMonitor.path | quote }}
        prometheus.io/port: {{ .Values.containerPort | quote }}
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "service-template.fullname" . }}
      containers:
        - name: {{ include "service-template.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          livenessProbe:
            httpGet: {path: {{ .Values.probes.liveness.path }}, port: http}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet: {path: {{ .Values.probes.readiness.path }}, port: http}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: SERVICE_NAME
              value: {{ include "service-template.name" . }}
            - name: ENVIRONMENT
              value: {{ .Release.Namespace }}
            {{- if .Values.observability.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otel.exporterEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ include "service-template.name" . }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace={{ .Release.Namespace }},service.version={{ .Values.image.tag }}"
            {{- end }}
            {{- toYaml .Values.env | nindent 12 }}
          {{- if .Values.envFrom }}
          envFrom: {{- toYaml .Values.envFrom | nindent 12 }}
          {{- end }}
