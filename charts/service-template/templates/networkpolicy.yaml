{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "service-template.fullname" . }}
  labels: {{- include "service-template.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "service-template.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress]
  ingress:
    - from:
        {{- if .Values.networkPolicy.allowIntraNamespace }}
        - podSelector: {}
        {{- end }}
        {{- range .Values.networkPolicy.allowFromNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
{{- end }}
