{{- if .Values.route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "service-template.fullname" . }}
  labels: {{- include "service-template.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.route.gatewayName }}
      namespace: {{ .Values.route.gatewayNamespace }}
  {{- if .Values.route.hostname }}
  hostnames: [{{ .Values.route.hostname | quote }}]
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.route.path }}
      {{- if .Values.route.stripPrefix }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /}
      {{- end }}
      backendRefs:
        - name: {{ include "service-template.fullname" . }}
          port: 80
{{- end }}
