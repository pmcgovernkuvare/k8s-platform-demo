apiVersion: v1
kind: Service
metadata:
  name: {{ include "service-template.fullname" . }}
  labels: {{- include "service-template.labels" . | nindent 4 }}
spec:
  selector: {{- include "service-template.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
