apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-datasources
  namespace: platform-observability
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://kps-kube-prometheus-stack-prometheus.platform-observability.svc.cluster.local:9090
        isDefault: true
        jsonData:
          exemplarTraceIdDestinations:
            - name: trace_id
              datasourceUid: tempo
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki-gateway.platform-observability.svc.cluster.local
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: 'trace_id=(\w+)'
              name: TraceID
              url: '$${__value.raw}'
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.platform-observability.svc.cluster.local:3100
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
            filterByTraceID: true
            tags: [{key: "service.name", value: "app"}]
          tracesToMetrics:
            datasourceUid: prometheus
            tags: [{key: "service.name", value: "service"}]
          serviceMap:
            datasourceUid: prometheus
          nodeGraph: {enabled: true}
