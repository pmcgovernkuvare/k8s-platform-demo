# Grafana Alloy: tails container logs on every node, enriches with k8s
# metadata (namespace/pod/labels), and ships to Loki. This is what makes
# "search logs by trace_id" possible - the OTel SDKs in our apps write the
# active trace_id into every log line, so a Loki query on trace_id="..."
# reconstructs the full cross-service log timeline for one request.
alloy:
  configMap:
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.process.add_labels.receiver]
      }

      loki.process "add_labels" {
        forward_to = [loki.write.default.receiver]
        stage.json {
          expressions = { trace_id = "trace_id", level = "level" }
        }
        stage.labels {
          values = { trace_id = "trace_id", level = "level" }
        }
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.platform-observability.svc.cluster.local/loki/api/v1/push"
        }
      }
controller:
  type: daemonset
resources:
  requests: {cpu: 50m, memory: 64Mi}
