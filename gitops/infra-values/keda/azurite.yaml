# Azurite: Microsoft's official local Azure Storage emulator. Gives us
# Azure Queue Storage (and Blob/Table, unused here) entirely on-cluster,
# with zero Azure subscription or credentials - the connection string is a
# fixed, publicly documented development account/key that only ever works
# against a local emulator.
apiVersion: v1
kind: Namespace
metadata:
  name: platform-azure
  labels: {purpose: local-azure-emulation}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: azurite
  namespace: platform-azure
  labels: {app: azurite}
spec:
  replicas: 1
  selector:
    matchLabels: {app: azurite}
  template:
    metadata:
      labels: {app: azurite}
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
        - name: azurite
          image: mcr.microsoft.com/azure-storage/azurite:latest
          args: ["azurite", "--queueHost", "0.0.0.0", "--blobHost", "0.0.0.0", "--tableHost", "0.0.0.0", "--skipApiVersionCheck"]
          ports:
            - {name: blob, containerPort: 10000}
            - {name: queue, containerPort: 10001}
            - {name: table, containerPort: 10002}
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 250m, memory: 256Mi}
          readinessProbe:
            tcpSocket: {port: 10001}
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: azurite
  namespace: platform-azure
spec:
  selector: {app: azurite}
  ports:
    - {name: blob, port: 10000, targetPort: blob}
    - {name: queue, port: 10001, targetPort: queue}
    - {name: table, port: 10002, targetPort: table}
