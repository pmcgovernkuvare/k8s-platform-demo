# order-service / prod
# Owned by: team-orders
image:
  repository: localhost:5001/order-service
  tag: "0.1.0"
replicaCount: 3
containerPort: 8080
resources:
  requests: {cpu: 100m, memory: 192Mi}
  limits: {cpu: 1000m, memory: 768Mi}
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
team: team-orders
tier: internal
route:
  enabled: false
mesh:
  inject: true
  serviceProfile:
    enabled: true
    routes:
      - name: check-inventory
        condition: {method: GET, pathRegex: "/inventory/[^/]+"}
        isRetryable: true
env:
  - name: INVENTORY_SERVICE_URL
    value: "http://inventory-service.prod.svc.cluster.local"
networkPolicy:
  enabled: true
  allowFromNamespaces: ["prod", "platform-observability"]
  allowIntraNamespace: true
