# order-service / test
# Owned by: team-orders
image:
  repository: localhost:5001/order-service
  tag: "0.1.0"
replicaCount: 2
containerPort: 8080
resources:
  requests: {cpu: 50m, memory: 96Mi}
  limits: {cpu: 500m, memory: 384Mi}
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
team: team-orders
tier: internal
route:
  enabled: false
mesh:
  inject: true
  serviceProfile:
    enabled: true
    routes:
      - name: check-inventory
        condition: {method: GET, pathRegex: "/inventory/[^/]+"}
        isRetryable: true
env:
  - name: INVENTORY_SERVICE_URL
    value: "http://inventory-service.test.svc.cluster.local"
networkPolicy:
  enabled: true
  allowFromNamespaces: ["test", "platform-observability"]
  allowIntraNamespace: true
