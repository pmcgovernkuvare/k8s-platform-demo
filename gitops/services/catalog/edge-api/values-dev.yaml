# edge-api / dev
# Owned by: team-storefront
# Change this file + open a PR to change anything about how edge-api runs
# in dev. CI (ci/.github/workflows/pr-validate.yml) lints and smoke-tests
# every change before a human reviews it.
image:
  repository: localhost:5001/edge-api
  tag: "0.1.0"          # bumped automatically by CI on merge to main / promotion PRs
replicaCount: 1
containerPort: 3000
resources:
  requests: {cpu: 25m, memory: 32Mi}
  limits: {cpu: 250m, memory: 128Mi}
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
team: team-storefront
tier: edge
route:
  enabled: true
  hostname: "edge-api.dev.demo.local"
  path: /
mesh:
  inject: true
  serviceProfile:
    enabled: true
    routes:
      - name: place-order
        condition: {method: POST, pathRegex: "/orders"}
        isRetryable: true
      - name: get-order
        condition: {method: GET, pathRegex: "/orders/[^/]+"}
env:
  - name: ORDER_SERVICE_URL
    value: "http://order-service.dev.svc.cluster.local"
